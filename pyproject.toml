[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unreachable = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true

[tool.basedpyright]
include = ["tests", "src/shenbi"]
exclude = [
    "tests/rounds/archived",
    "tests/rounds/round-[0-9][0-9][0-9]-*",
    "**/__pycache__",
    # P-1.A: legacy untyped code; P-1.D PR-12 removes these exclusions
]
typeCheckingMode = "strict"
pythonVersion = "3.11"
reportMissingTypeStubs = "warning"
# Unknown-family rules downgraded to warning for JSON/YAML dict access.
# Gates load heterogeneous external data (progress.json, deps.json, etc.)
# via jload/yload returning dict[str, Any]. Value access propagates Any,
# which strict mode flags as Unknown. These rules catch noise, not bugs —
# real type errors are still caught by reportArgumentType,
# reportPossiblyUnboundVariable, reportIndexIssue, reportUnnecessaryIsInstance.
# TypedDicts at boundaries would be the "proper" fix but require ongoing
# schema maintenance that doesn't suit this project's evolution stage.
reportUnknownMemberType = "warning"
reportUnknownVariableType = "warning"
reportUnknownArgumentType = "warning"
reportUnknownLambdaType = "warning"
reportUnknownParameterType = "warning"

# Per-directory overrides via executionEnvironments (basedpyright's
# supported mechanism — [[tool.basedpyright.overrides]] is not recognized).
# Rationale and revisit plan: docs/basedpyright-overrides.md
executionEnvironments = [
  # tests/: industry-norm relaxation for test code (Mock, fixtures, dynamic setattr).
  { root = "tests", reportUnusedVariable = "none", reportUnusedFunction = "none", reportUnusedImport = "none", reportUnknownVariableType = "none", reportUnknownLambdaType = "none", reportUnknownParameterType = "none", reportUnknownArgumentType = "none", reportUnknownMemberType = "none", reportMissingParameterType = "none", reportPrivateUsage = "none" },
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
norecursedirs = [
    "tests/rounds",
    "tests/fixtures",
    "tests/baselines",
    "tests/coverage",
    "tests/tiers",
    "tests/dispatcher",
    "tests/benchmarks",
    "tests/pressure-tests",
    "tests/skill-behavior",
    "tests/skill-triggering",
    ".hypothesis",
]
addopts = [
    "--strict-markers",
    "--cov=shenbi",
    "--cov-report=term-missing",
    "--cov-report=html:tests/coverage",
    "--cov-report=xml:tests/coverage/coverage.xml",
    "--cov-branch",
    "--timeout=60",
    "--timeout-method=thread",
    "--benchmark-min-rounds=5",
    "--benchmark-warmup=on",
]
markers = [
    "unit: fast unit tests",
    "integration: cross-module tests",
    "property: Hypothesis property-based tests",
    "benchmark: pytest-benchmark performance tests",
    "slow: > 5s tests",
    "last: tests that must run after all others (e.g., coverage threshold)",
]
asyncio_mode = "auto"

[tool.coverage.run]
branch = true
source = ["src/shenbi"]

[tool.coverage.report]
# Staged ramp-up. Phase 1 (PR-48~51) added happy-path tests raising coverage
# to ~25%. Target trajectory: 90% after PR-56.
# PR-54 raises to 55; PR-56 raises to 90.
fail_under = 25
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
