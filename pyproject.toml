[project]
name = "shenbi"
version = "0.1.0"
description = "Shenbi novel-writing AI skill framework"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "ThomasChangX" }]
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5.0",        # P-1 不用；为 P0 schemas 准备
    "pyyaml>=6.0.1",
    "structlog>=24.1.0",
    # 注：去除 patch>=1.16（unmaintained since 2016, codebase 用 unittest.mock）
    # 注：去除 click>=8.1.7（CLI 用 stdlib argparse，无需第三方框架；如未来需要 rich CLI 再加）
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-xdist>=3.5.0",
    "pytest-asyncio>=0.23.0",
    "pytest-timeout>=2.2.0",
    "pytest-benchmark>=4.0.0",
    "pytest-ordering>=0.6",
    "pytest-randomly>=3.15.0",
    "hypothesis>=6.97.0",
    "mypy>=1.8.0",
    "basedpyright>=1.13.0",
    "ruff>=0.1.13",
    "pre-commit>=3.6.0",
    "pip-audit>=2.7.0",
    "cyclonedx-bom>=4.0.0",
    "mutmut>=3.0.0",
    "coverage>=7.4.0",
    "yamllint>=1.33.0",
    "git-cliff>=2.4.0",
    "types-PyYAML>=6.0.12",
]
docs = [
    "mkdocs>=1.5.3",
    "mkdocs-material[imaging]>=9.5.4",
    "mkdocstrings[python]>=0.24.0",
]

[project.scripts]
shenbi-validate = "shenbi.gates.cli:main"
shenbi-dispatch = "shenbi.dispatcher.cli:main"
shenbi-score = "shenbi.scoring:main"
shenbi-summarize = "shenbi.summarize_round:main"
shenbi-progress = "shenbi.update_progress:main"
shenbi-phase = "shenbi.phase_runner:main"
shenbi-generate-plugins = "shenbi.plugins.generate:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shenbi"]

# Mutation testing configuration (P-1 加成项 19，baseline 跑在 PR-23)
[tool.mutmut]
paths-to-mutate = ["src/shenbi/exceptions.py", "src/shenbi/logging.py", "src/shenbi/gates/shared.py"]
tests-dir = "tests/unit/"
do-not-mutate = ["tests/rounds/archived/**"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "tests/rounds/archived",
    "tests/rounds/round-[0-9][0-9][0-9]-*",
]

[tool.ruff.lint]
select = [
    "E", "F", "W",
    "I",
    "N",
    "B",
    "A",
    "C4",
    "PIE", "RET", "SIM",
    "PL",
    "UP",
    "RUF",
    "D",
]
ignore = [
    "D100", "D104",
    "PLR0913",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"skills/**/*.md" = ["ALL"]
# P-1.A: legacy code in tests/*.py has many style violations.
# PR-12 (P-1.D) will refactor these files and remove the ignores.
