---
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          [pydantic>=2.5, structlog>=24.1.0, pyyaml>=6.0.1, types-PyYAML>=6.0.12]
        pass_filenames: false
        args: [src/shenbi/]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # mkdocs.yml uses MkDocs-specific !!python/name: tags (e.g. for the
        # pymdownx.superfences mermaid custom fence) that PyYAML's safe loader
        # cannot construct. MkDocs validates its own config at build time.
        exclude: ^mkdocs\.yml$
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: [--strict]
        files: \.(yaml|yml)$
        exclude: ^tests/rounds/(archived/|round-[0-9]{3}-)

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright (strict type check)
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false
      - id: lint-status-strings
        name: lint bare status strings (spec D3)
        entry: uv run python tools/lint_status_strings.py
        language: system
        pass_filenames: false
        types: [python]
      - id: lint-contracts
        name: contract schema + completeness (spec §5.5)
        entry: uv run python tools/lint_contracts.py
        language: system
        pass_filenames: false
      - id: lint-repo-consistency
        name: body-ban + loader-uniqueness + terminology (spec §5.5)
        entry: uv run python tools/lint_repo_consistency.py
        language: system
        pass_filenames: false
      - id: contract-sync-idempotency
        name: contract-sync idempotency (spec §5.5)
        entry: bash -c 'uv run shenbi-sync-contracts >/dev/null &&
          git diff --exit-code -- tests/tiers/deps.json docs/framework/ skills/'
        language: system
        pass_filenames: false
      - id: autocheck-docs-idempotency
        name: auto-check docs idempotency (spec P6)
        entry: bash -c 'uv run python tools/generate_autocheck_docs.py >/dev/null &&
          git diff --exit-code -- skills/'
        language: system
        pass_filenames: false
      - id: lint-no-forbid-with-computed-field
        name: N7 forbid-on-computed_field guard
        entry: uv run python tools/lint_no_forbid_with_computed_field.py src/shenbi/contracts
        language: system
        pass_filenames: false
        files: ^src/shenbi/contracts/.*\.py$
      - id: lint-no-fs-mutation
        name: purity lint -- no FS-mutation in src/shenbi/ (spec P4)
        entry: uv run python tools/lint_no_fs_mutation.py src/shenbi
        language: system
        pass_filenames: false
        files: ^src/shenbi/.*\.py$
