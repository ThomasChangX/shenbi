---
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          [pydantic>=2.5, structlog>=24.1.0, pyyaml>=6.0.1, types-PyYAML>=6.0.12]
        pass_filenames: false
        args: [src/shenbi/]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: [--strict]
        files: \.(yaml|yml)$
        exclude: ^tests/rounds/(archived/|round-[0-9]{3}-)

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright (strict type check)
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false
      - id: lint-status-strings
        name: lint bare status strings (spec D3)
        entry: uv run python tools/lint_status_strings.py
        language: system
        pass_filenames: false
        types: [python]
